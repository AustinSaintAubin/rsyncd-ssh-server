services:
  rsyncd:
    container_name: ${COMPOSE_PROJECT_NAME:-rsyncd-server}
    restart: on-failure:3
    # restart: unless-stopped
    build:
      context: ./build/rsyncd
      dockerfile: dockerfile
    healthcheck:
      test: ["CMD-SHELL", "rsync rsync://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "${RSYNCD_PORT:-873}:873/tcp"
    environment:
      RSYNCD_UID: ${RSYNCD_UID:-root}
      RSYNCD_GID: ${RSYNCD_GID:-root}
      RSYNCD_ADDRESS: ${RSYNCD_ADDRESS:-0.0.0.0}
      RSYNCD_LISTEN_BACKLOG: ${RSYNCD_LISTEN_BACKLOG:-32}
      RSYNCD_MAX_CONNECTIONS: ${RSYNCD_MAX_CONNECTIONS:-4}
      RSYNCD_TIMEOUT: ${RSYNCD_TIMEOUT:-600}
      RSYNCD_STRICT_MODES: ${RSYNCD_STRICT_MODES:-true}
      RSYNCD_LOGGING_TRANSFER: ${RSYNCD_LOGGING_TRANSFER:-false}
      RSYNCD_LOGGING_FORMAT: ${RSYNCD_LOGGING_FORMAT:-%o %h [%a] %m %f %l}
      RSYNCD_USERS: ${RSYNCD_USERS:-}
      RSYNCD_MODULES: ${RSYNCD_MODULES:?RSYNCD_MODULES must be set in .env or --env-file}
    volumes:
      - type: volume
        source: rsyncd_data
        target: /data
      # Optional custom config override:
      # - ./config/rsyncd.conf:/config/rsyncd.conf:ro
      # Optional mounted secrets file override:
      # - ./secrets/rsyncd.secrets:/run/secrets/rsyncd_secrets:rw
    # secrets:
    #   - source: rsyncd_secrets
    #     target: rsyncd_secrets

  rsync-ssh:
    container_name: ${COMPOSE_PROJECT_NAME:-rsyncd-server}-ssh
    restart: on-failure:3
    profiles: ["ssh"]
    build:
      context: ./build/ssh
      dockerfile: dockerfile
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - rsyncd
    ports:
      - "${RSYNC_SSH_PORT:-2222}:22/tcp"
    environment:
      RSYNC_SSH_PASSWORD_AUTH: ${RSYNC_SSH_PASSWORD_AUTH:-true}
      RSYNC_SSH_PUBKEY_AUTH: ${RSYNC_SSH_PUBKEY_AUTH:-true}
      RSYNC_SSH_LOG_LEVEL: ${RSYNC_SSH_LOG_LEVEL:-INFO}
      RSYNC_SSH_TRACE_COMMANDS: ${RSYNC_SSH_TRACE_COMMANDS:-false}
      RSYNC_SSH_UID_START: ${RSYNC_SSH_UID_START:-2000}
      RSYNC_SSH_RSYNC_PROXY_ENABLED: ${RSYNC_SSH_RSYNC_PROXY_ENABLED:-true}
      RSYNC_SSH_RSYNC_TARGET_HOST: ${RSYNC_SSH_RSYNC_TARGET_HOST:-rsyncd}
      RSYNC_SSH_RSYNC_TARGET_PORT: ${RSYNC_SSH_RSYNC_TARGET_PORT:-873}
      RSYNCD_USERS: ${RSYNCD_USERS:-}
      RSYNCD_MODULES: ${RSYNCD_MODULES:-}
      RSYNC_SSH_USERS: ${RSYNC_SSH_USERS:-}
    volumes:
      - type: volume
        source: rsyncd_data
        target: /data
      - type: volume
        source: rsync_ssh_state
        target: /state
      # Optional mounted secrets file override:
      # - ./secrets/rsyncd.secrets:/run/secrets/rsyncd_secrets:rw

# secrets:
#   rsyncd_secrets:
#     file: ${RSYNCD_SECRETS_FILE:-./secrets/rsyncd.secrets}

volumes:
  rsyncd_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${RSYNCD_HOST_DATA_DIR}

  rsync_ssh_state:
